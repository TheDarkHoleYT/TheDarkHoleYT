<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 4" width="100%" height="4" preserveAspectRatio="none">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#060608"/>
      <stop offset="25%"  stop-color="#991b1b"/>
      <stop offset="50%"  stop-color="#e53e3e"/>
      <stop offset="75%"  stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6666" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ff6666" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6666" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Base pulsing line -->
  <rect width="800" height="4" fill="url(#base)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Scan sweep highlight -->
  <rect x="-150" width="150" height="4" fill="url(#sweep)">
    <animate attributeName="x" from="-150" to="800" dur="2.5s" repeatCount="indefinite"/>
  </rect>
</svg>
